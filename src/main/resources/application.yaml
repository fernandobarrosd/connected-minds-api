springdoc:
  swagger-ui:
    path: /docs/ui
  api-docs:
    path: /docs
spring:
  application:
      name: connected-minds-api
  datasource:
    url: jdbc:postgresql://localhost:5432/connected_minds_db
    username: postgres
    password: postgres
  jpa:
    properties:
      hibernate.format_sql: true
    hibernate:
      ddl-auto: update
  security:
    secret-key: secret